<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaveron — История треков</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

.header { background: #16213e; padding: 10px 20px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; border-bottom: 2px solid #0f3460; }
.header h1 { font-size: 18px; color: #00d2ff; white-space: nowrap; }
.header a { color: #00d2ff; text-decoration: none; font-size: 13px; }
.header a:hover { text-decoration: underline; }

.controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.controls label { font-size: 13px; color: #aaa; }
.controls input[type="date"] { background: #0f3460; color: #fff; border: 1px solid #1a5276; padding: 6px 10px; border-radius: 4px; font-size: 14px; cursor: pointer; }
.controls button { background: #0f3460; color: #00d2ff; border: 1px solid #1a5276; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; }
.controls button:hover { background: #1a5276; }
.controls button.active { background: #00d2ff; color: #1a1a2e; }

.date-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.date-chip { background: #0f3460; color: #ccc; border: 1px solid #1a5276; padding: 4px 10px; border-radius: 12px; font-size: 12px; cursor: pointer; }
.date-chip:hover, .date-chip.active { background: #00d2ff; color: #1a1a2e; }

.main { display: flex; flex: 1; overflow: hidden; }

.sidebar { width: 340px; background: #16213e; border-right: 1px solid #0f3460; display: flex; flex-direction: column; overflow: hidden; }
.sidebar-header { padding: 10px 14px; border-bottom: 1px solid #0f3460; display: flex; justify-content: space-between; align-items: center; }
.sidebar-header span { font-size: 14px; font-weight: 600; }
.count { color: #00d2ff; font-size: 13px; }

.aircraft-list { flex: 1; overflow-y: auto; }
.aircraft-item { padding: 8px 14px; border-bottom: 1px solid #0f3460; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.15s; }
.aircraft-item:hover { background: #1a3a5c; }
.aircraft-item.selected { background: #0f3460; border-left: 3px solid #00d2ff; }
.aircraft-item .callsign { font-weight: 600; color: #fff; font-size: 14px; }
.aircraft-item .icao { color: #888; font-size: 11px; font-family: monospace; }
.aircraft-item .meta { text-align: right; font-size: 11px; color: #aaa; }
.aircraft-item .pts { color: #00d2ff; }

.search-box { padding: 8px 14px; border-bottom: 1px solid #0f3460; }
.search-box input { width: 100%; background: #0f3460; color: #fff; border: 1px solid #1a5276; padding: 6px 10px; border-radius: 4px; font-size: 13px; }

#map { flex: 1; }
.info-box { position: absolute; top: 10px; right: 10px; z-index: 1000; background: rgba(22,33,62,0.92); padding: 12px 16px; border-radius: 6px; border: 1px solid #0f3460; font-size: 12px; max-width: 260px; pointer-events: auto; }
.info-box h3 { color: #00d2ff; margin-bottom: 6px; font-size: 14px; }
.info-box .row { display: flex; justify-content: space-between; padding: 2px 0; }
.info-box .lbl { color: #888; }
.info-box .val { color: #fff; font-family: monospace; }

.loading { display: flex; align-items: center; justify-content: center; height: 100%; color: #888; font-size: 15px; }
.status { padding: 6px 14px; font-size: 12px; color: #888; border-top: 1px solid #0f3460; text-align: center; }

.tar1090-link { display: inline-block; margin-top: 8px; padding: 4px 10px; background: #0f3460; color: #00d2ff; border-radius: 4px; text-decoration: none; font-size: 12px; }
.tar1090-link:hover { background: #1a5276; }
</style>
</head>
<body>

<div class="header">
  <h1>Gaveron — История треков</h1>
  <a href="/">← Живая карта (tar1090)</a>
  <div class="controls">
    <label>Дата:</label>
    <input type="date" id="datePicker">
    <button id="btnPrev" title="Предыдущий день">◀</button>
    <button id="btnNext" title="Следующий день">▶</button>
    <button id="btnToday">Сегодня</button>
    <button id="btnShowAll" title="Показать все треки за день">Все треки</button>
  </div>
  <div class="date-chips" id="dateChips"></div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Поиск по callsign / ICAO...">
    </div>
    <div class="sidebar-header">
      <span>Самолёты</span>
      <span class="count" id="acCount">—</span>
    </div>
    <div class="aircraft-list" id="aircraftList">
      <div class="loading" id="listLoading">Выберите дату</div>
    </div>
    <div class="status" id="statusBar">Retention: 100 дней</div>
  </div>
  <div id="map"></div>
</div>

<script>
const map = L.map('map', { zoomControl: true }).setView([55.7558, 37.6173], 7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18, attribution: '&copy; OpenStreetMap'
}).addTo(map);

let allAircraft = [];
let trackLayers = {};  // icao -> L.polyline
let markerLayers = {}; // icao -> L.marker
let selectedIcao = null;
let infoControl = null;

// Colors for tracks
const COLORS = [
  '#00d2ff', '#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff',
  '#ff8c00', '#ee82ee', '#00fa9a', '#ff1493', '#7b68ee',
  '#20b2aa', '#dc143c', '#ffa07a', '#32cd32', '#ba55d3',
];
function colorForIcao(icao) {
  let hash = 0;
  for (let i = 0; i < icao.length; i++) hash = icao.charCodeAt(i) + ((hash << 5) - hash);
  return COLORS[Math.abs(hash) % COLORS.length];
}

// Date helpers
function today() { return new Date().toISOString().slice(0, 10); }
function shiftDate(dateStr, days) {
  const d = new Date(dateStr + 'T12:00:00Z');
  d.setUTCDate(d.getUTCDate() + days);
  return d.toISOString().slice(0, 10);
}
function formatTime(ts) {
  if (!ts) return '—';
  return new Date(ts * 1000).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
}

// Init date picker
const datePicker = document.getElementById('datePicker');
datePicker.value = today();
datePicker.max = today();

// Load available dates
async function loadDates() {
  try {
    const resp = await fetch('/api/dates');
    const data = await resp.json();
    const chips = document.getElementById('dateChips');
    chips.innerHTML = '';
    // Show last 10 dates
    data.dates.slice(0, 10).forEach(d => {
      const chip = document.createElement('span');
      chip.className = 'date-chip';
      chip.textContent = d;
      chip.onclick = () => { datePicker.value = d; loadDate(d); };
      chips.appendChild(chip);
    });
    if (data.dates.length > 0 && !datePicker.value) {
      datePicker.value = data.dates[0];
    }
  } catch(e) { console.error('Failed to load dates:', e); }
}

// Load aircraft for a date
async function loadDate(dateStr) {
  const listEl = document.getElementById('aircraftList');
  listEl.innerHTML = '<div class="loading">Загрузка...</div>';
  document.getElementById('acCount').textContent = '—';
  clearAllTracks();
  // Highlight active chip
  document.querySelectorAll('.date-chip').forEach(c => c.classList.toggle('active', c.textContent === dateStr));

  try {
    const resp = await fetch(`/api/aircraft-by-date?date=${dateStr}`);
    const data = await resp.json();
    allAircraft = data.aircraft;
    document.getElementById('acCount').textContent = data.count;
    document.getElementById('statusBar').textContent = `${dateStr} — ${data.count} самолётов`;
    renderList(allAircraft);
  } catch(e) {
    listEl.innerHTML = '<div class="loading">Ошибка загрузки</div>';
    console.error(e);
  }
}

function renderList(aircraft) {
  const listEl = document.getElementById('aircraftList');
  if (aircraft.length === 0) {
    listEl.innerHTML = '<div class="loading">Нет данных за эту дату</div>';
    return;
  }
  listEl.innerHTML = '';
  aircraft.forEach(ac => {
    const item = document.createElement('div');
    item.className = 'aircraft-item' + (ac.icao === selectedIcao ? ' selected' : '');
    const callsign = (ac.flight || '').trim() || ac.icao.toUpperCase();
    item.innerHTML = `
      <div>
        <div class="callsign">${callsign}</div>
        <div class="icao">${ac.icao.toUpperCase()} ${ac.category || ''} ${ac.squawk ? '▪ ' + ac.squawk : ''}</div>
      </div>
      <div class="meta">
        <div class="pts">${ac.positions} pts</div>
        <div>${formatTime(ac.first_seen)} — ${formatTime(ac.last_seen)}</div>
      </div>
    `;
    item.onclick = () => selectAircraft(ac.icao);
    listEl.appendChild(item);
  });
}

// Search filter
document.getElementById('searchInput').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase();
  const filtered = allAircraft.filter(ac =>
    ac.icao.toLowerCase().includes(q) ||
    (ac.flight || '').toLowerCase().includes(q)
  );
  renderList(filtered);
});

// Select aircraft and load its track
async function selectAircraft(icao) {
  selectedIcao = icao;
  // Highlight in list
  document.querySelectorAll('.aircraft-item').forEach(el => el.classList.remove('selected'));
  const items = document.querySelectorAll('.aircraft-item');
  items.forEach(el => {
    if (el.querySelector('.icao').textContent.toLowerCase().startsWith(icao)) {
      el.classList.add('selected');
    }
  });
  await loadTrack(icao);
}

async function loadTrack(icao) {
  const dateStr = datePicker.value;
  const [year, month, day] = dateStr.split('-');
  try {
    const resp = await fetch(`/globe_history/${year}/${month}/${day}/traces/${icao.slice(-2)}/trace_full_${icao}.json`);
    if (!resp.ok) { console.warn('No trace for', icao); return; }
    const data = await resp.json();
    drawTrack(icao, data);
  } catch(e) { console.error('Track load error:', e); }
}

function drawTrack(icao, data) {
  // Remove existing track
  if (trackLayers[icao]) { map.removeLayer(trackLayers[icao]); }
  if (markerLayers[icao]) { map.removeLayer(markerLayers[icao]); }

  if (!data.trace || data.trace.length === 0) return;

  const color = colorForIcao(icao);
  const latlngs = data.trace.map(p => [p[1], p[2]]);

  // Draw polyline
  const line = L.polyline(latlngs, { color, weight: 2.5, opacity: 0.85 }).addTo(map);
  trackLayers[icao] = line;

  // Marker at last position
  const last = data.trace[data.trace.length - 1];
  const flight = (last[8] && last[8].flight) || icao.toUpperCase();
  const alt = last[3] === 'ground' ? 'GND' : last[3] + ' ft';
  const marker = L.circleMarker([last[1], last[2]], {
    radius: 5, color, fillColor: color, fillOpacity: 1, weight: 1
  }).addTo(map);
  marker.bindTooltip(`${flight}<br>${alt}`, { permanent: false, direction: 'top' });
  markerLayers[icao] = marker;

  // Fit bounds
  map.fitBounds(line.getBounds().pad(0.1));

  // Show info
  showInfo(icao, data);
}

function showInfo(icao, data) {
  if (infoControl) map.removeControl(infoControl);
  const trace = data.trace;
  const first = trace[0];
  const last = trace[trace.length - 1];
  const flight = (last[8] && last[8].flight) || '';
  const baseTs = data.timestamp;
  const startTime = formatTime(baseTs + first[0]);
  const endTime = formatTime(baseTs + last[0]);
  const dateStr = datePicker.value;

  infoControl = L.control({ position: 'topright' });
  infoControl.onAdd = function() {
    const div = L.DomUtil.create('div', 'info-box');
    div.innerHTML = `
      <h3>${flight || icao.toUpperCase()}</h3>
      <div class="row"><span class="lbl">ICAO:</span><span class="val">${icao.toUpperCase()}</span></div>
      <div class="row"><span class="lbl">Точек:</span><span class="val">${trace.length}</span></div>
      <div class="row"><span class="lbl">Время:</span><span class="val">${startTime} — ${endTime}</span></div>
      <div class="row"><span class="lbl">Высота:</span><span class="val">${last[3] === 'ground' ? 'GND' : last[3] + ' ft'}</span></div>
      <div class="row"><span class="lbl">Скорость:</span><span class="val">${last[4] ? last[4] + ' kt' : '—'}</span></div>
      <a class="tar1090-link" href="/?showTrace=${dateStr}&icao=${icao}" target="_blank">Открыть в tar1090 →</a>
    `;
    return div;
  };
  infoControl.addTo(map);
}

function clearAllTracks() {
  Object.values(trackLayers).forEach(l => map.removeLayer(l));
  Object.values(markerLayers).forEach(l => map.removeLayer(l));
  trackLayers = {};
  markerLayers = {};
  if (infoControl) { map.removeControl(infoControl); infoControl = null; }
  selectedIcao = null;
}

// Show all tracks for the day
async function showAllTracks() {
  clearAllTracks();
  const dateStr = datePicker.value;
  document.getElementById('statusBar').textContent = `Загрузка всех треков за ${dateStr}...`;
  let loaded = 0;
  const promises = allAircraft.slice(0, 50).map(async (ac) => {
    const [year, month, day] = dateStr.split('-');
    try {
      const resp = await fetch(`/globe_history/${year}/${month}/${day}/traces/${ac.icao.slice(-2)}/trace_full_${ac.icao}.json`);
      if (resp.ok) {
        const data = await resp.json();
        drawTrack(ac.icao, data);
        loaded++;
      }
    } catch(e) {}
  });
  await Promise.all(promises);
  document.getElementById('statusBar').textContent = `${dateStr} — показано ${loaded} треков`;
  // Fit all tracks
  const allBounds = Object.values(trackLayers).map(l => l.getBounds());
  if (allBounds.length > 0) {
    let bounds = allBounds[0];
    allBounds.slice(1).forEach(b => bounds.extend(b));
    map.fitBounds(bounds.pad(0.05));
  }
}

// Event handlers
datePicker.addEventListener('change', () => loadDate(datePicker.value));
document.getElementById('btnPrev').addEventListener('click', () => {
  datePicker.value = shiftDate(datePicker.value, -1);
  loadDate(datePicker.value);
});
document.getElementById('btnNext').addEventListener('click', () => {
  const next = shiftDate(datePicker.value, 1);
  if (next <= today()) { datePicker.value = next; loadDate(datePicker.value); }
});
document.getElementById('btnToday').addEventListener('click', () => {
  datePicker.value = today();
  loadDate(datePicker.value);
});
document.getElementById('btnShowAll').addEventListener('click', showAllTracks);

// Init
loadDates();
loadDate(today());
</script>
</body>
</html>
