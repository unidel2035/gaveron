<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaveron — История треков</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

.header { background: #16213e; padding: 8px 20px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; border-bottom: 2px solid #0f3460; }
.header h1 { font-size: 17px; color: #00d2ff; white-space: nowrap; }
.header a { color: #00d2ff; text-decoration: none; font-size: 13px; }
.header a:hover { text-decoration: underline; }

.controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.controls label { font-size: 13px; color: #aaa; }
.controls input[type="date"] { background: #0f3460; color: #fff; border: 1px solid #1a5276; padding: 5px 8px; border-radius: 4px; font-size: 13px; cursor: pointer; }
.controls button { background: #0f3460; color: #00d2ff; border: 1px solid #1a5276; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
.controls button:hover { background: #1a5276; }
.controls button.active { background: #00d2ff; color: #1a1a2e; }
.controls .sep { color: #555; font-size: 13px; }

.date-chips { display: flex; gap: 5px; flex-wrap: wrap; }
.date-chip { background: #0f3460; color: #ccc; border: 1px solid #1a5276; padding: 3px 8px; border-radius: 12px; font-size: 11px; cursor: pointer; }
.date-chip:hover, .date-chip.active { background: #00d2ff; color: #1a1a2e; }

.main { display: flex; flex: 1; overflow: hidden; }

.sidebar { width: 340px; background: #16213e; border-right: 1px solid #0f3460; display: flex; flex-direction: column; overflow: hidden; }
.sidebar-header { padding: 8px 14px; border-bottom: 1px solid #0f3460; display: flex; justify-content: space-between; align-items: center; }
.sidebar-header span { font-size: 13px; font-weight: 600; }
.count { color: #00d2ff; font-size: 13px; }

.aircraft-list { flex: 1; overflow-y: auto; }
.aircraft-item { padding: 7px 14px; border-bottom: 1px solid #0f3460; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.15s; }
.aircraft-item:hover { background: #1a3a5c; }
.aircraft-item.selected { background: #0f3460; border-left: 3px solid #00d2ff; }
.aircraft-item .callsign { font-weight: 600; color: #fff; font-size: 13px; }
.aircraft-item .icao { color: #888; font-size: 10px; font-family: monospace; }
.aircraft-item .meta { text-align: right; font-size: 10px; color: #aaa; }
.aircraft-item .pts { color: #00d2ff; }
.del-btn { background: none; border: none; color: #ff6b6b; font-size: 14px; cursor: pointer; padding: 0 2px; opacity: 0.5; }
.del-btn:hover { opacity: 1; }

.search-box { padding: 6px 14px; border-bottom: 1px solid #0f3460; }
.search-box input { width: 100%; background: #0f3460; color: #fff; border: 1px solid #1a5276; padding: 5px 10px; border-radius: 4px; font-size: 12px; }

#map { flex: 1; }

.info-box { position: absolute; top: 10px; right: 10px; z-index: 1000; background: rgba(22,33,62,0.93); padding: 10px 14px; border-radius: 6px; border: 1px solid #0f3460; font-size: 12px; max-width: 280px; pointer-events: auto; }
.info-box h3 { color: #00d2ff; margin-bottom: 4px; font-size: 14px; }
.info-box .row { display: flex; justify-content: space-between; padding: 2px 0; }
.info-box .lbl { color: #888; }
.info-box .val { color: #fff; font-family: monospace; }
.info-box .tar1090-link { display: inline-block; margin-top: 6px; padding: 3px 8px; background: #0f3460; color: #00d2ff; border-radius: 4px; text-decoration: none; font-size: 11px; }
.info-box .tar1090-link:hover { background: #1a5276; }

.loading { display: flex; align-items: center; justify-content: center; height: 100%; color: #888; font-size: 14px; }
.status { padding: 5px 14px; font-size: 11px; color: #888; border-top: 1px solid #0f3460; text-align: center; }

/* Checkpoint tooltip on map */
.checkpoint-tooltip { background: rgba(22,33,62,0.9) !important; border: 1px solid #0f3460 !important; color: #e0e0e0 !important; font-size: 11px !important; padding: 4px 8px !important; border-radius: 4px !important; box-shadow: 0 2px 6px rgba(0,0,0,0.4) !important; white-space: nowrap !important; }
.checkpoint-tooltip .cp-time { color: #00d2ff; font-weight: 700; font-size: 12px; }
.checkpoint-tooltip .cp-alt { color: #ffd93d; }
.checkpoint-tooltip .cp-spd { color: #6bcb77; }
.checkpoint-tooltip::before { border-right-color: rgba(22,33,62,0.9) !important; }

/* Checkpoint controls */
.cp-controls { padding: 6px 14px; border-bottom: 1px solid #0f3460; display: flex; align-items: center; gap: 8px; }
.cp-controls label { font-size: 11px; color: #aaa; }
.cp-controls select { background: #0f3460; color: #fff; border: 1px solid #1a5276; padding: 3px 6px; border-radius: 4px; font-size: 11px; }
.cp-controls .cb { display: flex; align-items: center; gap: 4px; }
.cp-controls input[type="checkbox"] { accent-color: #00d2ff; }

/* Permanent track label */
.track-label { background: none !important; border: none !important; box-shadow: none !important; color: #fff !important; font-size: 11px !important; font-weight: 700 !important; text-shadow: 0 0 4px #000, 0 0 4px #000, 1px 1px 2px #000 !important; padding: 0 !important; white-space: nowrap !important; }
.track-label::before { display: none !important; }

/* Permanent UTC time label on checkpoint */
.cp-time-label { background: rgba(22,33,62,0.85) !important; border: 1px solid #1a5276 !important; color: #00d2ff !important; font-size: 10px !important; font-weight: 600 !important; padding: 1px 4px !important; border-radius: 3px !important; white-space: nowrap !important; }
.cp-time-label::before { display: none !important; }

/* Aircraft icon at end of track */
.aircraft-icon { background: none !important; border: none !important; box-shadow: none !important; font-size: 22px !important; text-shadow: 0 0 4px #000, 0 0 6px #000; line-height: 24px !important; text-align: center !important; }
.aircraft-icon::before { display: none !important; }
</style>
</head>
<body>

<div class="header">
  <h1>Gaveron — Архив треков</h1>
  <a href="/">← Живая карта</a>
  <div class="controls">
    <label>С:</label>
    <input type="date" id="dateFrom">
    <label>По:</label>
    <input type="date" id="dateTo">
    <button id="btnLoad">Загрузить</button>
    <span class="sep">|</span>
    <button id="btnToday">Сегодня</button>
    <button id="btnWeek">Неделя</button>
    <button id="btnMonth">Месяц</button>
    <span class="sep">|</span>
    <button id="btnShowAll">Все треки</button>
    <span class="sep">|</span>
    <button id="btnDeleteRange" style="color:#ff6b6b;">Удалить за период</button>
    <button id="btnDeleteAll" style="color:#ff6b6b;">Очистить всё</button>
  </div>
  <div class="date-chips" id="dateChips"></div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Поиск по callsign / ICAO...">
    </div>
    <div class="cp-controls">
      <div class="cb">
        <input type="checkbox" id="cbCheckpoints" checked>
        <label for="cbCheckpoints">Контрольные точки</label>
      </div>
      <select id="cpInterval">
        <option value="60">1 мин</option>
        <option value="300" selected>5 мин</option>
        <option value="600">10 мин</option>
        <option value="1800">30 мин</option>
        <option value="3600">1 час</option>
      </select>
    </div>
    <div class="sidebar-header">
      <span>Самолёты</span>
      <button id="btnShowAllSidebar" style="background:#0f3460;color:#00d2ff;border:1px solid #1a5276;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:11px;">Показать все</button>
      <span class="count" id="acCount">—</span>
    </div>
    <div class="aircraft-list" id="aircraftList">
      <div class="loading">Выберите период</div>
    </div>
    <div class="status" id="statusBar">Хранение: 100 дней</div>
  </div>
  <div id="map"></div>
</div>

<script>
const map = L.map('map', { zoomControl: true }).setView([55.7558, 37.6173], 7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18, attribution: '&copy; OpenStreetMap'
}).addTo(map);

let allAircraft = [];
let trackLayers = {};    // icao -> L.layerGroup (polyline + checkpoints)
let selectedIcao = null;
let infoControl = null;

const COLORS = [
  '#00d2ff','#ff6b6b','#ffd93d','#6bcb77','#4d96ff',
  '#ff8c00','#ee82ee','#00fa9a','#ff1493','#7b68ee',
  '#20b2aa','#dc143c','#ffa07a','#32cd32','#ba55d3',
];
function colorFor(icao) {
  let h = 0;
  for (let i = 0; i < icao.length; i++) h = icao.charCodeAt(i) + ((h << 5) - h);
  return COLORS[Math.abs(h) % COLORS.length];
}

function todayStr() { return new Date().toISOString().slice(0,10); }
function shiftDate(s, days) {
  const d = new Date(s + 'T12:00:00Z');
  d.setUTCDate(d.getUTCDate() + days);
  return d.toISOString().slice(0,10);
}
function fmtTime(ts) {
  if (!ts) return '—';
  return new Date(ts * 1000).toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}
function fmtUTC(ts) {
  if (!ts) return '—';
  return new Date(ts * 1000).toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit', second:'2-digit', timeZone:'UTC'}) + ' UTC';
}
function fmtDate(ts) {
  if (!ts) return '';
  return new Date(ts * 1000).toLocaleDateString('ru-RU', {day:'2-digit', month:'2-digit'});
}
function fmtDateUTC(ts) {
  if (!ts) return '';
  return new Date(ts * 1000).toLocaleDateString('ru-RU', {day:'2-digit', month:'2-digit', timeZone:'UTC'});
}
function fmtFullDateTimeUTC(ts) {
  if (!ts) return '';
  const d = new Date(ts * 1000);
  const date = d.toLocaleDateString('ru-RU', {day:'2-digit', month:'2-digit', year:'numeric', timeZone:'UTC'});
  const time = d.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit', timeZone:'UTC'}) + ' UTC';
  return date + '<br>' + time;
}
function fmtDateTime(ts) {
  if (!ts) return '—';
  const d = new Date(ts * 1000);
  return d.toLocaleDateString('ru-RU', {day:'2-digit', month:'2-digit'}) + ' ' +
         d.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
}

// Init date pickers
const dateFrom = document.getElementById('dateFrom');
const dateTo = document.getElementById('dateTo');
dateFrom.max = dateTo.max = todayStr();
dateFrom.value = dateTo.value = todayStr();

// ---- Data loading ----

async function loadDates() {
  try {
    const resp = await fetch('/api/dates');
    const data = await resp.json();
    const chips = document.getElementById('dateChips');
    chips.innerHTML = '';
    data.dates.slice(0, 14).forEach(d => {
      const chip = document.createElement('span');
      chip.className = 'date-chip';
      chip.textContent = d;
      chip.onclick = () => { dateFrom.value = dateTo.value = d; loadRange(); };
      chips.appendChild(chip);
    });
  } catch(e) { console.error(e); }
}

async function loadRange() {
  const from = dateFrom.value, to = dateTo.value;
  if (!from || !to) return;
  const listEl = document.getElementById('aircraftList');
  listEl.innerHTML = '<div class="loading">Загрузка...</div>';
  document.getElementById('acCount').textContent = '—';
  clearAll();

  // Highlight active chip
  const isSingle = (from === to);
  document.querySelectorAll('.date-chip').forEach(c =>
    c.classList.toggle('active', isSingle && c.textContent === from));

  try {
    const url = (from === to)
      ? `/api/aircraft-by-date?date=${from}`
      : `/api/aircraft-by-range?from=${from}&to=${to}`;
    const resp = await fetch(url);
    const data = await resp.json();
    allAircraft = data.aircraft;
    document.getElementById('acCount').textContent = data.count;
    const label = (from === to) ? from : `${from} — ${to}`;
    document.getElementById('statusBar').textContent = `${label} — ${data.count} самолётов`;
    renderList(allAircraft);
  } catch(e) {
    listEl.innerHTML = '<div class="loading">Ошибка загрузки</div>';
    console.error(e);
  }
}

function renderList(aircraft) {
  const listEl = document.getElementById('aircraftList');
  if (aircraft.length === 0) {
    listEl.innerHTML = '<div class="loading">Нет данных за период</div>';
    return;
  }
  listEl.innerHTML = '';
  aircraft.forEach(ac => {
    const item = document.createElement('div');
    item.className = 'aircraft-item' + (ac.icao === selectedIcao ? ' selected' : '');
    const cs = (ac.flight || '').trim() || ac.icao.toUpperCase();
    const multiDay = dateFrom.value !== dateTo.value;
    const timeStr = multiDay
      ? `${fmtDateTime(ac.first_seen)} — ${fmtDateTime(ac.last_seen)}`
      : `${fmtTime(ac.first_seen)} — ${fmtTime(ac.last_seen)}`;
    item.innerHTML = `
      <div>
        <div class="callsign">${cs}</div>
        <div class="icao">${ac.icao.toUpperCase()} ${ac.category||''} ${ac.squawk ? '&#9642; '+ac.squawk : ''}</div>
      </div>
      <div class="meta">
        <div class="pts">${ac.positions} pts</div>
        <div>${timeStr}</div>
        <button class="del-btn" title="Удалить трек">&times;</button>
      </div>`;
    item.querySelector('.del-btn').onclick = (e) => { e.stopPropagation(); deleteTrack(ac.icao); };
    item.onclick = () => selectAircraft(ac.icao);
    listEl.appendChild(item);
  });
}

// ---- Search ----
document.getElementById('searchInput').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  renderList(allAircraft.filter(ac =>
    ac.icao.toLowerCase().includes(q) || (ac.flight||'').toLowerCase().includes(q)
  ));
});

// ---- Track drawing ----

async function selectAircraft(icao) {
  clearAll();
  selectedIcao = icao;
  document.querySelectorAll('.aircraft-item').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll('.aircraft-item').forEach(el => {
    if (el.querySelector('.icao').textContent.toLowerCase().startsWith(icao)) el.classList.add('selected');
  });
  await loadTrack(icao);
}

async function loadTrack(icao) {
  const from = dateFrom.value, to = dateTo.value;
  try {
    const url = `/api/track-by-range/${icao}?from=${from}&to=${to}`;
    const resp = await fetch(url);
    if (!resp.ok) return;
    const data = await resp.json();
    drawTrack(icao, data, true);
  } catch(e) { console.error(e); }
}

function getCheckpointInterval() {
  return parseInt(document.getElementById('cpInterval').value);
}
function checkpointsEnabled() {
  return document.getElementById('cbCheckpoints').checked;
}

function drawTrack(icao, data, fitBounds) {
  // Remove old
  if (trackLayers[icao]) { map.removeLayer(trackLayers[icao]); delete trackLayers[icao]; }
  if (!data.trace || data.trace.length === 0) return;

  const color = colorFor(icao);
  const baseTs = data.timestamp;
  const group = L.layerGroup();

  // Build latlngs
  const latlngs = data.trace.map(p => [p[1], p[2]]);

  // Polyline
  const line = L.polyline(latlngs, { color, weight: 2.5, opacity: 0.85 });
  group.addLayer(line);

  // Callsign for labels
  const first = data.trace[0];
  const last = data.trace[data.trace.length - 1];
  const callsign = (last[8] && last[8].flight) || (first[8] && first[8].flight) || icao.toUpperCase();

  // Start marker (green circle)
  const startMarker = L.circleMarker([first[1], first[2]], {
    radius: 6, color: '#00ff00', fillColor: '#00ff00', fillOpacity: 1, weight: 2
  });
  startMarker.bindTooltip(
    `<div class="checkpoint-tooltip"><span class="cp-time">START<br>${fmtFullDateTimeUTC(baseTs + first[0])}</span><br>${callsign}</div>`,
    { permanent: false, direction: 'top', className: 'checkpoint-tooltip' }
  );
  group.addLayer(startMarker);

  // Permanent callsign label at middle of track
  const midIdx = Math.floor(data.trace.length / 2);
  const midPt = data.trace[midIdx];
  const nameLabel = L.marker([midPt[1], midPt[2]], {
    icon: L.divIcon({ className: 'track-label', html: callsign, iconSize: [0, 0], iconAnchor: [-4, 12] })
  });
  group.addLayer(nameLabel);

  // Checkpoints
  if (checkpointsEnabled()) {
    const interval = getCheckpointInterval();
    let nextCpTs = baseTs + first[0] + interval;

    for (let i = 1; i < data.trace.length - 1; i++) {
      const p = data.trace[i];
      const ts = baseTs + p[0];
      if (ts >= nextCpTs) {
        nextCpTs = ts + interval;
        const alt = p[3] === 'ground' ? 'GND' : (p[3] != null ? p[3] + ' ft' : '—');
        const spd = p[4] != null ? p[4] + ' kt' : '—';
        const vr = p[7] ? (p[7] > 0 ? '+' : '') + p[7] + ' ft/m' : '';
        const hdg = p[5] != null ? p[5] + '°' : '';
        const utcTime = fmtUTC(ts);

        const cp = L.circleMarker([p[1], p[2]], {
          radius: 4, color, fillColor: '#fff', fillOpacity: 0.9, weight: 2
        });

        // Permanent small UTC time label
        const cpDate = new Date(ts * 1000).toLocaleDateString('ru-RU', {day:'2-digit', month:'2-digit', year:'numeric', timeZone:'UTC'});
        const cpTime = new Date(ts * 1000).toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit', timeZone:'UTC'}) + ' UTC';
        const cpLabel = `${cpDate}<br>${cpTime}`;
        cp.bindTooltip(cpLabel, {
          permanent: true, direction: 'right', className: 'cp-time-label', offset: [6, 0]
        });

        // Detailed popup on hover (via popup instead)
        cp.bindPopup(
          `<div class="checkpoint-tooltip">` +
          `<span class="cp-time">${fmtFullDateTimeUTC(ts)}</span><br>` +
          `<b>${callsign}</b><br>` +
          `<span class="cp-alt">${alt}</span> | <span class="cp-spd">${spd}</span>` +
          (vr ? ` | ${vr}` : '') +
          (hdg ? ` | ${hdg}` : '') +
          `</div>`,
          { className: 'checkpoint-tooltip' }
        );
        group.addLayer(cp);
      }
    }
  }

  // End marker — bearing from previous trace point to last (continues the track line)
  const endAlt = last[3] === 'ground' ? 'GND' : last[3] + ' ft';
  let endHeading = last[5] || 0;
  if (data.trace.length >= 2) {
    const prev = data.trace[data.trace.length - 2];
    const dLon = (last[2] - prev[2]) * Math.PI / 180;
    const lat1 = prev[1] * Math.PI / 180;
    const lat2 = last[1] * Math.PI / 180;
    const y = Math.sin(dLon) * Math.cos(lat2);
    const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
    endHeading = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
  }
  const endMarker = L.marker([last[1], last[2]], {
    icon: L.divIcon({
      className: 'aircraft-icon',
      html: `<div style="transform:rotate(${endHeading + 180}deg);color:${color}">&#9992;</div>`,
      iconSize: [24, 24],
      iconAnchor: [12, 12],
    })
  });
  endMarker.bindTooltip(
    `<div class="checkpoint-tooltip"><span class="cp-time">END<br>${fmtFullDateTimeUTC(baseTs + last[0])}</span><br><b>${callsign}</b><br>${endAlt}</div>`,
    { permanent: false, direction: 'top', className: 'checkpoint-tooltip' }
  );
  group.addLayer(endMarker);

  group.addTo(map);
  trackLayers[icao] = group;

  if (fitBounds) {
    map.fitBounds(line.getBounds().pad(0.1));
    showInfo(icao, data);
  }
}

function showInfo(icao, data) {
  if (infoControl) map.removeControl(infoControl);
  const trace = data.trace;
  if (!trace || trace.length === 0) return;
  const first = trace[0], last = trace[trace.length - 1];
  const baseTs = data.timestamp;
  const flight = (last[8] && last[8].flight) || '';
  const from = dateFrom.value, to = dateTo.value;
  const label = (from === to) ? from : `${from} — ${to}`;

  infoControl = L.control({ position: 'topright' });
  infoControl.onAdd = function() {
    const div = L.DomUtil.create('div', 'info-box');
    div.innerHTML = `
      <h3>${flight || icao.toUpperCase()}</h3>
      <div class="row"><span class="lbl">ICAO:</span><span class="val">${icao.toUpperCase()}</span></div>
      <div class="row"><span class="lbl">Точек:</span><span class="val">${trace.length}</span></div>
      <div class="row"><span class="lbl">Начало:</span><span class="val">${fmtDateTime(baseTs + first[0])}</span></div>
      <div class="row"><span class="lbl">Конец:</span><span class="val">${fmtDateTime(baseTs + last[0])}</span></div>
      <div class="row"><span class="lbl">Высота:</span><span class="val">${last[3]==='ground' ? 'GND' : last[3]+' ft'}</span></div>
      <div class="row"><span class="lbl">Скорость:</span><span class="val">${last[4] ? last[4]+' kt' : '—'}</span></div>
      <a class="tar1090-link" href="/?showTrace=${from}&icao=${icao}" target="_blank">Открыть в tar1090 &rarr;</a>
    `;
    return div;
  };
  infoControl.addTo(map);
}

function clearAll() {
  Object.values(trackLayers).forEach(l => map.removeLayer(l));
  trackLayers = {};
  if (infoControl) { map.removeControl(infoControl); infoControl = null; }
  selectedIcao = null;
}

// ---- Show all tracks ----

async function showAllTracks() {
  clearAll();
  const from = dateFrom.value, to = dateTo.value;
  const label = (from === to) ? from : `${from} — ${to}`;
  document.getElementById('statusBar').textContent = `Загрузка всех треков за ${label}...`;
  let loaded = 0;
  // Load up to 60 aircraft in parallel (batches of 10)
  const batch = 10;
  for (let i = 0; i < allAircraft.length && i < 60; i += batch) {
    const chunk = allAircraft.slice(i, i + batch);
    await Promise.all(chunk.map(async ac => {
      try {
        const resp = await fetch(`/api/track-by-range/${ac.icao}?from=${from}&to=${to}`);
        if (resp.ok) {
          const data = await resp.json();
          drawTrack(ac.icao, data, false);
          loaded++;
        }
      } catch(e) {}
    }));
  }
  document.getElementById('statusBar').textContent = `${label} — показано ${loaded} треков`;
  // Fit all
  const bounds = [];
  Object.values(trackLayers).forEach(g => {
    g.eachLayer(l => { if (l.getBounds) bounds.push(l.getBounds()); });
  });
  if (bounds.length > 0) {
    let b = bounds[0];
    bounds.slice(1).forEach(x => b.extend(x));
    map.fitBounds(b.pad(0.05));
  }
}

// ---- Event handlers ----

document.getElementById('btnLoad').addEventListener('click', loadRange);
dateFrom.addEventListener('change', () => { if (dateTo.value < dateFrom.value) dateTo.value = dateFrom.value; });
dateTo.addEventListener('change', () => { if (dateFrom.value > dateTo.value) dateFrom.value = dateTo.value; });

document.getElementById('btnToday').addEventListener('click', () => {
  dateFrom.value = dateTo.value = todayStr(); loadRange();
});
document.getElementById('btnWeek').addEventListener('click', () => {
  dateTo.value = todayStr(); dateFrom.value = shiftDate(todayStr(), -6); loadRange();
});
document.getElementById('btnMonth').addEventListener('click', () => {
  dateTo.value = todayStr(); dateFrom.value = shiftDate(todayStr(), -29); loadRange();
});
document.getElementById('btnShowAll').addEventListener('click', showAllTracks);
document.getElementById('btnShowAllSidebar').addEventListener('click', showAllTracks);

// ---- Delete functions ----

async function deleteTrack(icao) {
  if (!confirm('Удалить все треки ' + icao.toUpperCase() + '?')) return;
  try {
    const resp = await fetch('/api/tracks/' + icao, { method: 'DELETE' });
    const data = await resp.json();
    document.getElementById('statusBar').textContent = 'Удалено ' + data.deleted_positions + ' точек для ' + icao.toUpperCase();
    loadRange();
  } catch(e) { console.error(e); }
}

document.getElementById('btnDeleteRange').addEventListener('click', async () => {
  const from = dateFrom.value, to = dateTo.value;
  if (!from || !to) return;
  const label = (from === to) ? from : from + ' — ' + to;
  if (!confirm('Удалить все треки за ' + label + '?')) return;
  try {
    const url = (from === to)
      ? '/api/tracks-by-date?date=' + from
      : '/api/tracks-by-range?from=' + from + '&to=' + to;
    const resp = await fetch(url, { method: 'DELETE' });
    const data = await resp.json();
    document.getElementById('statusBar').textContent = 'Удалено ' + data.deleted_positions + ' точек за ' + label;
    clearAll();
    loadDates();
    loadRange();
  } catch(e) { console.error(e); }
});

document.getElementById('btnDeleteAll').addEventListener('click', async () => {
  if (!confirm('Удалить ВСЕ треки из архива? Это действие необратимо!')) return;
  if (!confirm('Точно удалить? Все данные будут потеряны.')) return;
  try {
    const resp = await fetch('/api/tracks-all', { method: 'DELETE' });
    const data = await resp.json();
    document.getElementById('statusBar').textContent = 'Архив очищен: удалено ' + data.deleted_positions + ' точек';
    clearAll();
    loadDates();
    loadRange();
  } catch(e) { console.error(e); }
});

// Re-draw checkpoints when settings change
document.getElementById('cbCheckpoints').addEventListener('change', () => {
  const selected = selectedIcao;
  if (Object.keys(trackLayers).length > 0) { showAllTracks(); }
  else if (selected) { loadTrack(selected); }
});
document.getElementById('cpInterval').addEventListener('change', () => {
  const selected = selectedIcao;
  if (Object.keys(trackLayers).length > 1) { showAllTracks(); }
  else if (selected) { loadTrack(selected); }
});

// Init
loadDates();
loadRange();
</script>
