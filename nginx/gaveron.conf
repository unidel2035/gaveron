# Nginx configuration for Gaveron
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled

server {
    listen 80;
    server_name _;

    # Proxy API requests to Gaveron server
    location /gaveron/data/ {
        proxy_pass http://127.0.0.1:8080/data/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin "*";
    }

    location /gaveron/chunks/ {
        proxy_pass http://127.0.0.1:8080/chunks/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin "*";
    }

    location /gaveron/health {
        proxy_pass http://127.0.0.1:8080/health;
    }

    # Static files for web frontend (when added)
    # location /gaveron/ {
    #     alias /usr/local/share/gaveron/html/;
    #     try_files $uri $uri/ /gaveron/index.html;
    # }
}
